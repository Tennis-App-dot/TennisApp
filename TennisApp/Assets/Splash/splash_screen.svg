<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Tennis Ball - centered, large for splash -->
  <g transform="translate(256,220)">
    <!-- Ball body -->
    <circle cx="0" cy="0" r="100" fill="#C8E63A"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#A5C830" stroke-width="3.5"/>

    <!-- Tennis ball seam (curved lines) -->
    <path d="M -50,-87 C -17,-33 -17,33 -50,87" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
    <path d="M 50,-87 C 17,-33 17,33 50,87" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

    <!-- Highlight -->
    <ellipse cx="-25" cy="-33" rx="30" ry="20" fill="#D4F04A" opacity="0.6" transform="rotate(-30,-25,-33)"/>
  </g>

  <!-- App name text -->
  <text x="256" y="370" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#FFFFFF" letter-spacing="3">Tennis App</text>

  <!-- Subtitle -->
  <text x="256" y="405" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#CE93D8" letter-spacing="1">Court Management System</text>
</svg>
