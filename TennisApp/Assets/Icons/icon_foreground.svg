<?xml version="1.0" encoding="UTF-8"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <!-- Tennis Ball -->
  <g transform="translate(228,228)">
    <!-- Ball body -->
    <circle cx="0" cy="0" r="120" fill="#C8E63A"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#A5C830" stroke-width="4"/>

    <!-- Tennis ball seam (curved lines) -->
    <path d="M -60,-104 C -20,-40 -20,40 -60,104" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <path d="M 60,-104 C 20,-40 20,40 60,104" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>

    <!-- Highlight -->
    <ellipse cx="-30" cy="-40" rx="35" ry="25" fill="#D4F04A" opacity="0.6" transform="rotate(-30,-30,-40)"/>
  </g>

  <!-- Racket silhouette (bottom-right) -->
  <g transform="translate(310,310) rotate(45)">
    <!-- Handle -->
    <rect x="-6" y="30" width="12" height="50" rx="4" fill="#FFFFFF" opacity="0.7"/>
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="30" ry="40" fill="none" stroke="#FFFFFF" stroke-width="5" opacity="0.7"/>
    <!-- Strings -->
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="-8" y1="-27" x2="-8" y2="27" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="8" y1="-27" x2="8" y2="27" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="-20" y1="-8" x2="20" y2="-8" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="-20" y1="8" x2="20" y2="8" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
