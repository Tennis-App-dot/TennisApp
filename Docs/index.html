<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Tennis - ดาวน์โหลดแอป</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            margin: 0 auto 24px;
            object-fit: cover;
        }
        h1 {
            color: #1C1B1F;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .version {
            color: #888;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .description {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 16px 48px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }
        .instructions {
            margin-top: 32px;
            text-align: left;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
        }
        .instructions h3 {
            color: #1C1B1F;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .instructions ol {
            color: #555;
            font-size: 14px;
            line-height: 2;
            padding-left: 20px;
        }
        .footer {
            margin-top: 24px;
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="icon.png" alt="Talent Tennis" class="logo"
             onerror="this.style.display='none'">
        <h1>Talent Tennis</h1>
        <p class="version">เวอร์ชัน 1.0.0</p>
        <p class="description">
            แอปจัดการสนามเทนนิส จองคอร์ท<br>
            จัดการคอร์สเรียน และผู้เรียน
        </p>

        <!-- ═══ เปลี่ยน URL นี้เป็นลิงก์จริงหลัง upload APK ═══ -->
        <a href="https://github.com/Tennis-App-dot/TennisApp/releases/latest/download/com.arcro.talenttennis.apk"
           class="download-btn">
            ⬇ ดาวน์โหลด APK
        </a>

        <div class="instructions">
            <h3>📱 วิธีติดตั้ง</h3>
            <ol>
                <li>กดปุ่ม "ดาวน์โหลด APK" ด้านบน</li>
                <li>เปิดไฟล์ที่ดาวน์โหลด</li>
                <li>หากระบบถาม ให้กด "อนุญาตจากแหล่งนี้"</li>
                <li>กด "ติดตั้ง" แล้วรอจนเสร็จ</li>
            </ol>
        </div>

        <p class="footer">&copy; 2025 Arcro — Talent Tennis</p>
    </div>
</body>
</html>
